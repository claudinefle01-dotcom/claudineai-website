<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're in! — ClaudineAI</title>
  <link rel="canonical" href="https://www.claudineai.com/thank-you.html" />
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0F2347;
      color: #fff;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px;
    }
    .card {
      max-width: 520px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      padding: 56px 48px;
    }
    .icon { font-size: 56px; margin-bottom: 24px; }
    h1 { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 14px; }
    h1 span { color: #E8A020; }
    p { font-size: 17px; color: rgba(255,255,255,.65); line-height: 1.65; margin-bottom: 32px; }
    a {
      display: inline-block;
      background: #E8A020; color: #0F2347;
      font-weight: 700; font-size: 15px;
      padding: 14px 28px; border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>You're <span>in!</span></h1>
    <p>Check your inbox — the RCTF Formula is on its way. If you don't see it in a minute, check your spam folder and mark it as "not spam."</p>
    <a href="/">← Back to ClaudineAI</a>
  </div>
</body>
</html>
